<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Sheeps and Giggles Community Farm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sky: #7ec8e3;
      --sky-deep: #4da8cc;
      --sky-pale: #e0f2f9;
      --ink: #1a2a3a;
      --ink-soft: rgba(26, 42, 58, 0.7);
      --white: #ffffff;
      --cream: #fdfaf5;
      --green: #5a9e6f;
      --green-deep: #3d7b54;
      --green-soft: #e8f5ec;
      --radius: 20px;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(253, 250, 245, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(26, 42, 58, 0.06);
    }

    .nav-brand {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--ink-soft);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 150ms;
    }

    .nav-links a:hover { color: var(--ink); }

    .btn-donate {
      display: inline-flex;
      align-items: center;
      padding: 0.78rem 1.65rem;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      background: linear-gradient(135deg, var(--green), var(--green-deep));
      color: var(--white);
      box-shadow: 0 4px 20px rgba(90, 158, 111, 0.3);
      transition: transform 200ms var(--ease-smooth), box-shadow 200ms var(--ease-smooth);
    }

    .btn-donate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(90, 158, 111, 0.45);
    }

    .page-header {
      padding: 8rem 2rem 3rem;
      text-align: center;
    }

    .page-header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .page-header p {
      color: var(--ink-soft);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 550px;
      margin: 0 auto;
    }

    .gallery {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #dfe8dd;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms var(--ease-smooth);
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 18, 26, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms;
    }

    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .mobile-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      margin: 5px 0;
      border-radius: 2px;
    }

    footer {
      padding: 2rem;
      border-top: 1px solid rgba(26, 42, 58, 0.06);
      background: var(--white);
      text-align: center;
    }

    footer p {
      color: var(--ink-soft);
      font-size: 0.78rem;
    }

    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; align-items: flex-start; }
      .mobile-toggle { display: block; margin-top: 0.1rem; }

      .nav-links {
        position: absolute;
        top: calc(100% + 0.5rem);
        left: 1rem;
        right: 1rem;
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 0.75rem;
        padding: 1rem;
        background: rgba(253, 250, 245, 0.98);
        border: 1px solid rgba(26, 42, 58, 0.08);
        border-radius: 18px;
        box-shadow: 0 18px 48px rgba(26, 42, 58, 0.12);
      }

      .nav-links.open { display: flex; }
      .nav-links li, .nav-links a { width: 100%; }

      .gallery { grid-template-columns: 1fr; padding: 0 1.25rem 4rem; }
      .page-header { padding: 7rem 1.25rem 2rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Sheeps and Giggles</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#mission">About</a></li>
      <li><a href="/#programs">Programs</a></li>
      <li><a href="/#involved">Get Involved</a></li>
      <li><a href="/#contact">Contact</a></li>
      <li><a href="/#involved" class="btn-donate">Support the Farm</a></li>
    </ul>
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-header">
    <h1>Farm Gallery</h1>
    <p>Photos from the Sheeps and Giggles Community Farm at Fingal.</p>
  </div>

  <div class="gallery" id="gallery">
    <div class="gallery-item"><img src="/gallery/main.jpg.webp" alt="Farm main view" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/image5.jpg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/image6.jpg.webp" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/image18.jpg.webp" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/image23.jpg.webp" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.Ae6tBUUNt_IYI0gqptLBcaw9ByS9mwvS5PPaRg9I1e8.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.hHoumM1njNdd4ETQEWgnSk4n2sj6WVkfpOp5wYhGKNs.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.L20H4TXVQaY8DUlIcz_0JWptsXJNUuV1vhL8c12jrZE.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.XpJMlEReyFAtPLPYPRRJQ0KMUerLvHnUuiNkE3peDxU.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.LeclA_574cienmxH5H6SpyWgewf-K5ZQ5kvajPub0K4.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.oj4NqgoRRYW_oanWZN2Wy4K0bBYaKHhOx7U5_L44QpQ.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.JZvAFscVD7UFhyjEPsWGZTk8ZNxQZfrnSxD-Lf4OMv4.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.wWLZRPzG1-28m0e3H9aLFcl4OVZbaSdngyBSGemUI10.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.i7thE-Ebl7qL1vAeCJg54iQfgErq4Pyo-RzsFM5bnvA.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.RRn7-rfaOe7kGMBNngzRiob3H174zFVv8OKdNz9G6U8.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.a0EDK01LCjlmn0AZGIQWFAnG1zGfQEq-Vl0GDvCzBy8.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.5AiVZus7DBWnm4ekQi4-17SrVSqw6Rip4co5Tweg1Cc.jpeg" alt="Farm photo" loading="lazy"></div>
    <div class="gallery-item"><img src="/gallery/att.SWCCTi17wpCzCRuLCJzdRVfD3u4Uc7re3NZyVJ-DVXY.jpeg" alt="Farm photo" loading="lazy"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
  </div>

  <footer>
    <p>&copy; 2026 Sheeps and Giggles Community Farm. Operated by Sheeps and Giggles Farm Inc.</p>
  </footer>

  <script>
    const mobileToggle = document.getElementById('mobile-toggle');
    const navLinks = document.getElementById('nav-links');
    mobileToggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const items = document.querySelectorAll('.gallery-item img');
    let currentIndex = 0;

    items.forEach((img, i) => {
      img.addEventListener('click', () => {
        currentIndex = i;
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('open');
      });
    });

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.classList.remove('open');
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    document.getElementById('lightbox-prev').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      lightboxImg.src = items[currentIndex].src;
      lightboxImg.alt = items[currentIndex].alt;
    });

    document.getElementById('lightbox-next').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % items.length;
      lightboxImg.src = items[currentIndex].src;
      lightboxImg.alt = items[currentIndex].alt;
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') lightbox.classList.remove('open');
      if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
    });
  </script>
</body>
</html>
